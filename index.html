<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سامانه بازدید ایستگاه‌ها</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a5276; --accent: #27ae60; --danger: #e74c3c; --accent2: #e67e22;
}
body { font-family: 'Vazirmatn', sans-serif; background: #f0f4f8; color: #1c2833; }
.header, .desktop-header { background: var(--primary); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
.nav-tabs { display: flex; background: var(--primary); }
.nav-tab { flex: 1; padding: 12px; text-align: center; color: rgba(255,255,255,0.8); cursor: pointer; border: none; background: transparent; font-family: 'Vazirmatn', sans-serif; font-size: 14px; }
.nav-tab.active { color: white; background: rgba(255,255,255,0.15); }
.screen { display: none; }
.screen.active { display: block; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
.form-control { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-family: 'Vazirmatn', sans-serif; }
.form-control:focus { outline: none; border-color: var(--primary); }
.btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-family: 'Vazirmatn', sans-serif; }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--accent); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-warning { background: #f39c12; color: white; }
#map { height: 650px; border-radius: 12px; }
.offline-banner { background: var(--accent2); color: white; text-align: center; padding: 8px; font-size: 14px; display: none; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 30px; color: white; z-index: 10000; display: none; }
.desktop-sidebar { width: 240px; background: #1c2833; color: white; padding: 20px 0; min-height: 100vh; }
.sidebar-item { padding: 14px 20px; cursor: pointer; border: none; background: transparent; color: white; width: 100%; text-align: right; font-family: 'Vazirmatn', sans-serif; font-size: 16px; }
.sidebar-item.active, .sidebar-item:hover { background: rgba(255,255,255,0.1); }
.desktop-main { flex: 1; padding: 24px; overflow-y: auto; }
.desktop-table { width: 100%; border-collapse: collapse; background: white; }
.desktop-table th { background: var(--primary); color: white; padding: 12px; text-align: right; }
.desktop-table td { padding: 12px; border-bottom: 1px solid #ddd; }
#desktopPanel { display: none; flex-direction: row; height: 100vh; }
#mobileApp { display: none; }
#loginScreen { display: block; }
.report-photos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.report-photos img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
.welcome-text { font-size: 18px; font-weight: 600; color: white; }
.logout-btn { background: transparent; border: 1px solid white; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<div id="app">
  <div id="offlineBanner" class="offline-banner">📵 آفلاین — گزارش‌ها پس از اتصال ارسال می‌شوند</div>

  <!-- Login -->
  <div id="loginScreen" class="screen active">
    <div class="card" style="max-width:420px;margin:100px auto;padding:32px;">
      <h2 style="text-align:center;color:var(--primary);">سامانه بازدید ایستگاه‌ها</h2>
      <p style="text-align:center;color:#666;margin-bottom:20px;">لطفاً وارد شوید</p>
      <input type="text" id="loginUsername" class="form-control" placeholder="نام کاربری">
      <input type="password" id="loginPassword" class="form-control" placeholder="رمز عبور">
      <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="loginUser()">ورود</button>
      <button class="btn" style="width:100%;margin-top:10px;background:#eee;" onclick="skipToMobile()">ورود بدون ثبت‌نام (مهمان)</button>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="mobileApp" class="screen">
    <div class="header">
      <div>🌦️ سامانه بازدید ایستگاه</div>
      <button onclick="switchToDesktop()" style="color:white;background:transparent;border:1px solid white;padding:6px 12px;border-radius:6px;cursor:pointer;">🖥️ پنل مدیر</button>
    </div>

    <!-- Welcome Bar -->
    <div id="welcomeBar" style="background:var(--primary);color:white;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);">
      <span id="welcomeText" class="welcome-text">👋 خوش آمدید!</span>
      <button onclick="logoutMobile()" class="logout-btn">🚪 خروج</button>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('report')">📝 ثبت گزارش</button>
      <button class="nav-tab" onclick="showTab('myreports')">📋 گزارش‌های من</button>
    </div>

    <div id="screen-report" class="screen active">
      <div id="step1">
        <div class="card">
          <h3>انتخاب ایستگاه</h3>
          <input type="text" class="form-control" placeholder="جستجو..." oninput="filterStations(this.value)">
          <div id="stationsList"></div>
        </div>
      </div>
      <div id="step2" style="display:none;">
        <div class="card">
          <h3 id="selectedStationName"></h3>
          <button class="btn" onclick="backToStep1()" style="background:#eee;">تغییر ایستگاه</button>
        </div>
        <div class="card">
          <label>تاریخ بازدید</label>
          <input type="text" id="visitDate" class="form-control">
        </div>
        <div class="card">
          <label>توضیحات کارشناس</label>
          <textarea id="expertDescription" class="form-control" rows="4" placeholder="مشاهدات، مشکلات، پیشنهادات و ... را وارد کنید" style="resize:vertical;"></textarea>
        </div>
        <div class="card">
          <label>عکس (حداکثر ۵)</label>
          <input type="file" id="photoInput" multiple accept="image/*" onchange="handlePhotos(this)">
          <div id="photoPreviews" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
        </div>
        <button class="btn btn-success" style="width:100%;padding:14px;font-size:16px;" onclick="submitReport()">✅ ثبت و ارسال گزارش</button>
      </div>
    </div>

    <div id="screen-myreports" class="screen">
      <div id="myReportsList"></div>
    </div>
  </div>

  <!-- Desktop Admin -->
  <div id="desktopPanel" class="screen">
    <div class="desktop-sidebar">
      <button class="sidebar-item active" onclick="showDesktopScreen('d-stations')">📍 مدیریت ایستگاه‌ها</button>
      <button class="sidebar-item" onclick="showDesktopScreen('d-map')">🗺️ نقشه ایستگاه‌ها</button>
      <button class="sidebar-item" onclick="showDesktopScreen('d-reports')">📋 همه گزارش‌ها</button>
      <button class="sidebar-item" onclick="logout()" style="color:#ff6b6b;">🚪 خروج</button>
    </div>
    <div class="desktop-main">
      <!-- Stations -->
      <div id="d-stations" class="screen active">
        <h2>مدیریت ایستگاه‌ها</h2>
        <button class="btn btn-primary" onclick="openAddStationModal()">➕ افزودن ایستگاه</button>
        <button class="btn" onclick="document.getElementById('excelInput').click()" style="background:#27ae60;color:white;">📊 آپلود Excel</button>
        <input type="file" id="excelInput" style="display:none" onchange="importExcel(this)">
        <table class="desktop-table">
          <thead>
            <tr>
              <th>نام</th>
              <th>کد</th>
              <th>نوع</th>
              <th>استان</th>
              <th>عملیات</th>
            </tr>
          </thead>
          <tbody id="stationsTableBodyContent"></tbody>
        </table>
      </div>

      <!-- Map -->
      <div id="d-map" class="screen">
        <h2>🗺️ نقشه ایستگاه‌ها</h2>
        <div id="map"></div>
        <div id="map-station-info" style="margin-top:20px;background:white;padding:16px;border-radius:12px;"></div>
      </div>

      <!-- Reports -->
      <div id="d-reports" class="screen">
        <h2>📋 همه گزارش‌ها</h2>
        <div id="allReportsList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Station Modal -->
<div id="stationModal" class="modal-overlay">
  <div class="modal">
    <h3 id="modalTitle">افزودن ایستگاه جدید</h3>
    <input type="hidden" id="editId">
    <input type="text" id="stName" class="form-control" placeholder="نام ایستگاه">
    <input type="text" id="stCode" class="form-control" placeholder="کد ایستگاه">
    <select id="stType" class="form-control">
      <option value="weather">هواشناسی</option>
      <option value="hydro">هیدرومتری</option>
      <option value="both">هر دو</option>
    </select>
    <input type="text" id="stProvince" class="form-control" placeholder="استان">
    <input type="number" id="stLat" class="form-control" placeholder="عرض جغرافیایی">
    <input type="number" id="stLon" class="form-control" placeholder="طول جغرافیایی">
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-success" onclick="saveStation()">ذخیره</button>
      <button class="btn" onclick="closeModal()" style="background:#eee;">انصراف</button>
    </div>
  </div>
</div>

<!-- Edit Report Modal -->
<div id="editReportModal" class="modal-overlay">
  <div class="modal">
    <h3 id="editModalTitle">ویرایش گزارش</h3>
    <input type="hidden" id="editReportId">
    <div class="card">
      <label>تاریخ بازدید</label>
      <input type="text" id="editVisitDate" class="form-control">
    </div>
    <div class="card">
      <label>توضیحات کارشناس</label>
      <textarea id="editDescription" class="form-control" rows="4" style="resize:vertical;"></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-success" onclick="updateReport()">💾 ذخیره تغییرات</button>
      <button class="btn" onclick="closeEditModal()" style="background:#eee;">انصراف</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============== تعریف Supabase ==============
const SUPABASE_URL = 'https://wzkoxmiskougznduoktb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6a294bWlza291Z3puZHVva3RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDUwNjksImV4cCI6MjA5NzY4MTA2OX0.-wD6o0qfrjaul9UrhnORLs3IPlYfUOt11juwrtqyf7k';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============== متغیرهای عمومی ==============
let allStations = [];
let allReports = [];
let selectedStation = null;
let selectedPhotos = [];
let map = null;
let isOnline = navigator.onLine;
let currentUser = null;
let editingReportId = null;

// ============== سیستم کاربری ==============

// لیست کاربران مجاز (می‌تونی این رو به دیتابیس هم منتقل کنی)
const USERS = {
  'کارشناس1': '123456',
  'کارشناس2': '123456',
  'کارشناس3': '123456',
  'مدیر': 'admin123'
};

function loginUser() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  
  if (!username || !password) {
    showToast('لطفاً نام کاربری و رمز عبور را وارد کنید', 'error');
    return;
  }

  // بررسی کاربر در لیست
  if (USERS[username] && USERS[username] === password) {
    currentUser = username;
    localStorage.setItem('currentUser', username);
    showToast('✅ خوش آمدید ' + username, 'success');
    enterApp();
  } else {
    showToast('❌ نام کاربری یا رمز عبور اشتباه است', 'error');
  }
}

function skipToMobile() {
  currentUser = 'مهمان';
  localStorage.setItem('currentUser', 'مهمان');
  enterApp();
}

function enterApp() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mobileApp').style.display = 'block';
  document.getElementById('mobileApp').classList.add('active');
  
  // نمایش نام کاربر
  const welcomeText = document.getElementById('welcomeText');
  if (currentUser === 'مهمان') {
    welcomeText.textContent = '👋 خوش آمدید (مهمان)';
  } else {
    welcomeText.textContent = '👋 خوش آمدید ' + currentUser;
  }
  
  initMobile();
}

function logoutMobile() {
  currentUser = null;
  localStorage.removeItem('currentUser');
  location.reload();
}

// ============== توابع اولیه ==============
function initMobile() { 
  loadStations(); 
  loadUserReports(); 
  setDefaultDateTime(); 
}

function initDesktop() { 
  loadStations(); 
  loadAllReports(); 
  setTimeout(initMap, 500);
}

// ============== راه‌اندازی اولیه ==============
window.onload = function() {
  setupOnlineDetection();
  
  // بررسی کاربر ذخیره شده
  const savedUser = localStorage.getItem('currentUser');
  if (savedUser && USERS[savedUser]) {
    currentUser = savedUser;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mobileApp').style.display = 'block';
    document.getElementById('mobileApp').classList.add('active');
    const welcomeText = document.getElementById('welcomeText');
    welcomeText.textContent = '👋 خوش آمدید ' + currentUser;
    initMobile();
  } else {
    document.getElementById('loginScreen').classList.add('active');
  }
};

// ============== توابع اصلی ==============

function setupOnlineDetection() {
  const banner = document.getElementById('offlineBanner');
  function update() {
    isOnline = navigator.onLine;
    if (banner) {
      banner.style.display = isOnline ? 'none' : 'block';
    }
    if (isOnline) syncOfflineReports();
  }
  window.addEventListener('online', update);
  window.addEventListener('offline', update);
  update();
}

function showTab(tab) {
  document.querySelectorAll('#mobileApp .screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + tab);
  if (target) target.classList.add('active');
}

function setDefaultDateTime() { 
  const now = new Date();
  const dateStr = now.toLocaleDateString('fa-IR');
  const el = document.getElementById('visitDate');
  if (el) el.value = dateStr; 
}

function loadStations() {
  console.log('🔄 در حال بارگذاری ایستگاه‌ها...');
  supabaseClient.from('stations').select('*').order('name').then(({ data, error }) => {
    if (error) {
      console.error('❌ خطا در بارگذاری ایستگاه‌ها:', error);
      showToast('خطا در بارگذاری ایستگاه‌ها', 'error');
      return;
    }
    allStations = data || [];
    console.log('✅ تعداد ایستگاه‌ها:', allStations.length);
    renderStationsList();
    renderStationsTable();
    if (map) renderMarkers();
  });
}

function loadUserReports() {
  if (!currentUser || currentUser === 'مهمان') {
    allReports = [];
    renderMyReports();
    return;
  }
  
  supabaseClient.from('reports')
    .select('*')
    .eq('visitor', currentUser)
    .order('created_at', { ascending: false })
    .then(({ data, error }) => {
      if (error) {
        console.error('❌ خطا در بارگذاری گزارش‌ها:', error);
        return;
      }
      allReports = data || [];
      renderMyReports();
    });
}

function loadAllReports() {
  supabaseClient.from('reports').select('*').order('created_at', { ascending: false }).then(({ data, error }) => {
    if (error) {
      console.error('❌ خطا در بارگذاری همه گزارش‌ها:', error);
      return;
    }
    allReports = data || [];
    renderAllReports();
  });
}

function filterStations(filter) {
  renderStationsList(filter);
}

function renderStationsList(filter = '') {
  const filtered = allStations.filter(s => 
    (s.name && s.name.includes(filter)) || 
    (s.code && s.code.includes(filter))
  );
  const container = document.getElementById('stationsList');
  if (!container) return;
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="card" style="text-align:center;color:#999;">هیچ ایستگاهی پیدا نشد</div>';
    return;
  }
  
  container.innerHTML = filtered.map(s => `
    <div class="card" onclick="selectStation('${s.id}')" style="cursor:pointer;">
      <strong>${s.name || 'بدون نام'}</strong><br>کد: ${s.code || '---'} | ${s.province || ''}
    </div>
  `).join('');
}

function selectStation(id) {
  selectedStation = allStations.find(s => s.id === id);
  if (!selectedStation) return;
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('selectedStationName').textContent = selectedStation.name || 'بدون نام';
}

function backToStep1() {
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').style.display = 'none';
}

function handlePhotos(input) {
  selectedPhotos = Array.from(input.files).slice(0, 5);
  const div = document.getElementById('photoPreviews');
  if (!div) return;
  div.innerHTML = selectedPhotos.map(f => 
    `<img src="${URL.createObjectURL(f)}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;">`
  ).join('');
}

function submitReport() {
  if (!selectedStation) {
    showToast('ایستگاه انتخاب نشده', 'error');
    return;
  }
  
  if (!currentUser || currentUser === 'مهمان') {
    showToast('لطفاً ابتدا وارد شوید', 'error');
    return;
  }
  
  const visitDate = document.getElementById('visitDate').value || new Date().toLocaleDateString('fa-IR');
  const description = document.getElementById('expertDescription').value.trim() || 'بدون توضیحات';

  const report = {
    station_id: selectedStation.id,
    station_name: selectedStation.name || 'بدون نام',
    station_code: selectedStation.code || '---',
    visitor: currentUser,
    visit_date: visitDate,
    description: description,
    created_at: new Date().toISOString(),
    photos: []
  };

  if (!isOnline) {
    let offline = JSON.parse(localStorage.getItem('offline_reports_' + currentUser) || '[]');
    offline.push(report);
    localStorage.setItem('offline_reports_' + currentUser, JSON.stringify(offline));
    showToast('گزارش ذخیره شد (آفلاین)', 'success');
    resetReportForm();
    return;
  }

  // آنلاین
  const uploadPromises = selectedPhotos.map(file => {
    const fileName = `${Date.now()}_${file.name}`;
    return supabaseClient.storage.from('photos').upload(fileName, file)
      .then(({ error }) => {
        if (!error) {
          const { data: urlData } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
          if (urlData) report.photos.push(urlData.publicUrl);
        }
      });
  });

  Promise.all(uploadPromises).then(() => {
    return supabaseClient.from('reports').insert([report]);
  }).then(({ error }) => {
    if (error) throw error;
    showToast('گزارش ثبت شد ✅', 'success');
    resetReportForm();
    loadUserReports();
  }).catch(e => {
    showToast('خطا در ثبت: ' + e.message, 'error');
  });
}

function resetReportForm() {
  selectedPhotos = [];
  document.getElementById('photoPreviews').innerHTML = '';
  document.getElementById('photoInput').value = '';
  document.getElementById('expertDescription').value = '';
  backToStep1();
}

function syncOfflineReports() {
  if (!currentUser || currentUser === 'مهمان') return;
  
  let offline = JSON.parse(localStorage.getItem('offline_reports_' + currentUser) || '[]');
  if (!offline.length) return;
  let count = 0;
  const promises = offline.map(r => {
    return supabaseClient.from('reports').insert([r]).then(({ error }) => {
      if (!error) count++;
    }).catch(() => {});
  });
  
  Promise.all(promises).then(() => {
    if (count > 0) {
      localStorage.removeItem('offline_reports_' + currentUser);
      showToast(`${count} گزارش آفلاین ارسال شد`, 'success');
      loadUserReports();
    }
  });
}

function renderMyReports() {
  const container = document.getElementById('myReportsList');
  if (!container) return;
  
  if (!currentUser || currentUser === 'مهمان') {
    container.innerHTML = '<div class="card" style="text-align:center;color:#999;">لطفاً وارد شوید تا گزارش‌های خود را ببینید</div>';
    return;
  }
  
  if (allReports.length === 0) {
    container.innerHTML = '<div class="card" style="text-align:center;color:#999;">هیچ گزارشی ثبت نشده است</div>';
    return;
  }
  
  container.innerHTML = allReports.map(r => `
    <div class="card">
      <strong>${r.station_name || 'بدون نام'}</strong><br>
      تاریخ: ${r.visit_date || '---'}<br>
      توضیحات: ${r.description || 'بدون توضیحات'}<br>
      ${r.photos && r.photos.length > 0 ? `<div class="report-photos">${r.photos.map(p => `<img src="${p}" alt="عکس">`).join('')}</div>` : ''}
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="btn btn-warning" onclick="openEditReport('${r.id}')" style="padding:4px 12px;font-size:12px;">✏️ ویرایش</button>
        <button class="btn btn-danger" onclick="deleteReport('${r.id}')" style="padding:4px 12px;font-size:12px;">🗑️ حذف</button>
      </div>
    </div>
  `).join('');
}

function renderAllReports() {
  const container = document.getElementById('allReportsList');
  if (!container) return;
  
  if (allReports.length === 0) {
    container.innerHTML = '<div class="card" style="text-align:center;color:#999;">هیچ گزارشی ثبت نشده است</div>';
    return;
  }
  
  container.innerHTML = allReports.map(r => `
    <div class="card">
      <strong>${r.station_name || 'بدون نام'}</strong><br>
      بازدیدکننده: ${r.visitor || 'ناشناس'}<br>
      تاریخ: ${r.visit_date || '---'}<br>
      توضیحات: ${r.description || 'بدون توضیحات'}<br>
      ${r.photos && r.photos.length > 0 ? `<div class="report-photos">${r.photos.map(p => `<img src="${p}" alt="عکس">`).join('')}</div>` : ''}
    </div>
  `).join('');
}

// ============== ویرایش و حذف گزارش ==============

function openEditReport(reportId) {
  const report = allReports.find(r => r.id === reportId);
  if (!report) {
    showToast('گزارش پیدا نشد', 'error');
    return;
  }
  
  // فقط کاربر خودش می‌تونه ویرایش کنه
  if (report.visitor !== currentUser) {
    showToast('شما اجازه ویرایش این گزارش را ندارید', 'error');
    return;
  }
  
  editingReportId = reportId;
  document.getElementById('editReportId').value = reportId;
  document.getElementById('editVisitDate').value = report.visit_date || '';
  document.getElementById('editDescription').value = report.description || '';
  document.getElementById('editModalTitle').textContent = 'ویرایش گزارش - ' + report.station_name;
  document.getElementById('editReportModal').style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('editReportModal').style.display = 'none';
  editingReportId = null;
}

function updateReport() {
  if (!editingReportId) {
    showToast('خطا در ویرایش', 'error');
    return;
  }
  
  const visitDate = document.getElementById('editVisitDate').value;
  const description = document.getElementById('editDescription').value.trim() || 'بدون توضیحات';
  
  supabaseClient.from('reports')
    .update({
      visit_date: visitDate,
      description: description
    })
    .eq('id', editingReportId)
    .then(({ error }) => {
      if (error) {
        showToast('خطا در ویرایش: ' + error.message, 'error');
        return;
      }
      showToast('گزارش ویرایش شد ✅', 'success');
      closeEditModal();
      loadUserReports();
    });
}

function deleteReport(reportId) {
  const report = allReports.find(r => r.id === reportId);
  if (!report) return;
  
  if (report.visitor !== currentUser) {
    showToast('شما اجازه حذف این گزارش را ندارید', 'error');
    return;
  }
  
  if (!confirm('آیا از حذف این گزارش اطمینان دارید؟')) return;
  
  supabaseClient.from('reports')
    .delete()
    .eq('id', reportId)
    .then(({ error }) => {
      if (error) {
        showToast('خطا در حذف: ' + error.message, 'error');
        return;
      }
      showToast('گزارش حذف شد', 'success');
      loadUserReports();
    });
}

// ============== توابع دسکتاپ ==============

function showDesktopScreen(id) {
  document.querySelectorAll('.desktop-main > div').forEach(d => d.style.display = 'none');
  const target = document.getElementById(id);
  if (target) target.style.display = 'block';
  
  if (id === 'd-map') {
    setTimeout(initMap, 300);
  }
  if (id === 'd-reports') {
    loadAllReports();
  }
}

function initMap() {
  if (map) {
    map.invalidateSize();
    return;
  }
  const mapContainer = document.getElementById('map');
  if (!mapContainer) return;
  
  try {
    map = L.map('map').setView([35.5, 52], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
    renderMarkers();
  } catch(e) {
    console.error('❌ خطا در نقشه:', e);
  }
}

function renderMarkers() {
  if (!map) return;
  allStations.forEach(s => {
    if (!s.latitude || !s.longitude) return;
    const marker = L.marker([s.latitude, s.longitude]).addTo(map);
    marker.bindPopup(`<b>${s.name || 'بدون نام'}</b><br>کد: ${s.code || '---'}`);
    marker.on('click', () => showStationReports(s));
  });
}

function showStationReports(s) {
  const reports = allReports.filter(r => r.station_id === s.id).slice(0, 5);
  let html = `<h3>${s.name || 'بدون نام'}</h3>`;
  if (reports.length === 0) {
    html += '<p>هیچ گزارشی برای این ایستگاه وجود ندارد</p>';
  } else {
    reports.forEach(r => {
      html += `<div style="padding:10px;background:#f8f9fa;margin:6px 0;border-radius:8px;">
        ${r.visit_date || '---'} - ${r.visitor || 'ناشناس'}<br>
        <strong>توضیحات:</strong> ${r.description || 'بدون توضیحات'}
        ${r.photos && r.photos.length > 0 ? `<br><div class="report-photos">${r.photos.map(p => `<img src="${p}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;">`).join('')}</div>` : ''}
      </div>`;
    });
  }
  const container = document.getElementById('map-station-info');
  if (container) container.innerHTML = html;
}

function renderStationsTable() {
  const container = document.getElementById('stationsTableBodyContent');
  if (!container) return;
  container.innerHTML = allStations.map(s => `
    <tr>
      <td>${s.name || 'بدون نام'}</td>
      <td>${s.code || '---'}</td>
      <td>${s.type || '---'}</td>
      <td>${s.province || '---'}</td>
      <td>
        <button class="btn btn-primary" onclick="editStation('${s.id}')" style="padding:4px 12px;font-size:12px;">ویرایش</button>
        <button class="btn btn-danger" onclick="deleteStation('${s.id}')" style="padding:4px 12px;font-size:12px;">حذف</button>
      </td>
    </tr>
  `).join('');
}

// ============== مدیریت ایستگاه‌ها ==============

function openAddStationModal(editId = null) {
  document.getElementById('editId').value = editId || '';
  document.getElementById('modalTitle').textContent = editId ? 'ویرایش ایستگاه' : 'افزودن ایستگاه';
  
  if (editId) {
    const station = allStations.find(s => s.id === editId);
    if (station) {
      document.getElementById('stName').value = station.name || '';
      document.getElementById('stCode').value = station.code || '';
      document.getElementById('stType').value = station.type || 'weather';
      document.getElementById('stProvince').value = station.province || '';
      document.getElementById('stLat').value = station.latitude || '';
      document.getElementById('stLon').value = station.longitude || '';
    }
  } else {
    document.getElementById('stName').value = '';
    document.getElementById('stCode').value = '';
    document.getElementById('stType').value = 'weather';
    document.getElementById('stProvince').value = '';
    document.getElementById('stLat').value = '';
    document.getElementById('stLon').value = '';
  }
  
  document.getElementById('stationModal').style.display = 'flex';
}

function editStation(id) {
  openAddStationModal(id);
}

function deleteStation(id) {
  if (!confirm('آیا از حذف این ایستگاه اطمینان دارید؟')) return;
  supabaseClient.from('stations').delete().eq('id', id).then(({ error }) => {
    if (error) {
      showToast('خطا در حذف: ' + error.message, 'error');
      return;
    }
    showToast('ایستگاه حذف شد', 'success');
    loadStations();
  });
}

function saveStation() {
  const data = {
    name: document.getElementById('stName').value,
    code: document.getElementById('stCode').value,
    type: document.getElementById('stType').value,
    province: document.getElementById('stProvince').value,
    latitude: parseFloat(document.getElementById('stLat').value) || null,
    longitude: parseFloat(document.getElementById('stLon').value) || null
  };

  if (!data.name) {
    showToast('لطفاً نام ایستگاه را وارد کنید', 'error');
    return;
  }

  const editId = document.getElementById('editId').value;
  const operation = editId 
    ? supabaseClient.from('stations').update(data).eq('id', editId)
    : supabaseClient.from('stations').insert([data]);
  
  operation.then(({ error }) => {
    if (error) {
      showToast('خطا: ' + error.message, 'error');
      return;
    }
    showToast(editId ? 'ایستگاه ویرایش شد ✅' : 'ایستگاه اضافه شد ✅', 'success');
    closeModal();
    loadStations();
  });
}

function closeModal() {
  document.getElementById('stationModal').style.display = 'none';
}

function importExcel(input) {
  if (!input.files || !input.files[0]) {
    showToast('لطفاً یک فایل Excel انتخاب کنید', 'error');
    return;
  }
  showToast('فایل Excel دریافت شد. قابلیت پردازش در نسخه بعدی اضافه می‌شود.', 'success');
  input.value = '';
}

// ============== توابع کمکی ==============

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.style.background = type === 'success' ? '#27ae60' : '#e74c3c';
  t.style.display = 'block';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.style.display = 'none', 3500);
}

function switchToDesktop() { 
  alert('برای ورود به پنل مدیریت، از صفحه ورود استفاده کنید.');
}

function logout() {
  supabaseClient.auth.signOut().catch(() => {});
  location.reload();
}

// ============== کیبورد ==============
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
    closeEditModal();
  }
});

console.log('✅ سامانه بازدید ایستگاه‌ها با موفقیت بارگذاری شد!');
console.log('📡 وضعیت اتصال:', isOnline ? 'آنلاین' : 'آفلاین');
